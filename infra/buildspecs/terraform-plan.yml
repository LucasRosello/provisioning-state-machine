version: 0.2

# Runs terraform init + plan for a single request against an IMMUTABLE template
# commit. Invoked by Step Functions via codebuild:startBuild.sync.
#
# Env (provided by the CodeBuild project + EnvironmentVariablesOverride):
#   REQUEST_ID, TEMPLATE_COMMIT_SHA, MODULE_PATH, STATE_KEY
#   TEMPLATES_REPO_URL, ARTIFACTS_BUCKET, TF_STATE_BUCKET, TF_LOCK_TABLE, AWS_REGION_NAME

phases:
  install:
    commands:
      - yum install -y unzip git jq >/dev/null
      - TF_VERSION=1.9.5
      - curl -sS -o /tmp/tf.zip "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"
      - unzip -o /tmp/tf.zip -d /usr/local/bin >/dev/null
      - terraform version

  pre_build:
    commands:
      - echo "Checking out templates at immutable commit ${TEMPLATE_COMMIT_SHA}"
      - git clone "${TEMPLATES_REPO_URL}" repo
      - cd repo
      - git checkout "${TEMPLATE_COMMIT_SHA}"
      - cd "${MODULE_PATH}"
      - aws dynamodb update-item --region "${AWS_REGION_NAME}" --table-name "${REQUESTS_TABLE}"
          --key "{\"request_id\":{\"S\":\"${REQUEST_ID}\"}}"
          --update-expression "SET #s = :s" --expression-attribute-names '{"#s":"status"}'
          --expression-attribute-values "{\":s\":{\"S\":\"PLANNING\"}}" || true

  build:
    commands:
      - echo "Downloading generated tfvars for ${REQUEST_ID}"
      - aws s3 cp "s3://${ARTIFACTS_BUCKET}/${REQUEST_ID}/terraform.tfvars.json" ./terraform.tfvars.json
      - terraform init -input=false
          -backend-config="bucket=${TF_STATE_BUCKET}"
          -backend-config="key=${STATE_KEY}"
          -backend-config="dynamodb_table=${TF_LOCK_TABLE}"
          -backend-config="region=${AWS_REGION_NAME}"
      - terraform plan -input=false -var-file=terraform.tfvars.json -out=tfplan
      - terraform show -json tfplan > tfplan.json

  post_build:
    commands:
      - echo "Uploading plan artifacts"
      - aws s3 cp tfplan "s3://${ARTIFACTS_BUCKET}/${REQUEST_ID}/tfplan"
      - aws s3 cp tfplan.json "s3://${ARTIFACTS_BUCKET}/${REQUEST_ID}/tfplan.json"
